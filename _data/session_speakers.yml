career-journeys:
  panelists:
    - name: Cameron Craddock
      talk_title: "My Open Science Career"
      talk_summary: >-
        While responding to a question on a career panel at AACAP in 2014, one of my co-panelists
        opined that I was overly optimistic about how successful junior scientists can be doing open
        science. This was based on the slow-going institutional changes that are still needed to
        fully recognize and compensate for open science contributions. I will discuss how
        sustainability challenges in open science shaped my later research career and led to my
        current career in industry, including questions about whether open science means everything
        should be free for everyone and what service models can allow underlying tools to remain
        free while still generating revenue.
    - name: Cassandra Gould Van Praag
      talk_title: "Open Science Brought Passion and Purpose to My Career"
      talk_summary: >-
        Open science showed me how community can be used to address an imbalance of power. In this
        talk I will sketch out my timeline of engagement with open science, EDI, and community; how
        the actions of others allowed me to explore my passion; and how much I love helping others
        claim their power in this system.
    - name: Stephanie Noble
      talk_title: "Beyond the Degree: Career Paths and Collaborative Science for Early Career Researchers"
      talk_summary: >-
        Dr. Noble will reflect on how open, collaborative, and interdisciplinary science has formed
        an integral part of her career journey as an early career researcher. Given the importance
        of networking for unlocking career opportunities—whether across disciplines or outside of
        academia—she will share practical strategies for cultivating relationships to support your
        scientific journey wherever it might take you.
    - name: Subapriya Suppiah
      talk_title: "Imaging the Brain in the Open: From Neuroscience to Real-World Care"
      talk_summary: >-
        This talk traces an academic journey at the intersection of neuroscience, clinical
        neuroimaging, and nuclear medicine, highlighting how multimodal and molecular imaging can
        deepen the understanding of brain structure–function relationships while improving real-world
        patient care. The talk reflects on open science as a lived practice—rooted in collaboration,
        data sharing, cross-disciplinary partnerships, and building professional capacity in
        neuroimaging—that strengthens research even within the constraints of clinical service and
        academic medicine.
  moderators:
    - Chloe Page
    - James Kent

